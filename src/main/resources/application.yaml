spring:
  application:
    name: bill-splitter-api

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://db.zrlizembiyemqozmxqaa.supabase.co:5432/postgres
    username: postgres
    password: ${SUP_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}

---